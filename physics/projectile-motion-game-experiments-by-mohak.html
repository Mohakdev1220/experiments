<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon 3D Artillery</title>
    <!-- Three.js Core & OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff007f;
            --success: #39ff14;
            --bg-glass: rgba(10, 10, 26, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .view-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 243, 255, 0.1);
            color: var(--primary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid var(--primary);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .back-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        /* Glassmorphism Panels */
        .panel {
            background: var(--bg-glass);
            border: 1px solid rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }

        .hud-overlay {
            position: absolute;
            top: 80px;
            left: 20px;
            z-index: 10;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 8px;
            text-shadow: 0 0 10px var(--primary);
        }

        .slider-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .slider-header span:last-child {
            color: var(--secondary);
            font-family: monospace;
            font-weight: bold;
            text-shadow: 0 0 5px var(--secondary);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--secondary);
            background: #1e1e38;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .fire-btn {
            background: linear-gradient(135deg, #ff007f 0%, #cc0066 100%);
            color: white;
            border: 1px solid #ff4da6;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            transition: all 0.2s;
        }

        .fire-btn:active { transform: scale(0.95); }
        .fire-btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        .telemetry-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            gap: 30px;
        }

        .telemetry-stat span { color: #a5b4fc; display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;}
        .telemetry-stat strong { color: var(--primary); font-size: 1.2rem; font-family: monospace; text-shadow: 0 0 8px var(--primary); }

        .notification {
            position: absolute;
            top: 100px;
            right: 20px;
            z-index: 20;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notification.show { opacity: 1; transform: translateX(0); }
        .notification.success { background: rgba(57, 255, 20, 0.2); color: var(--success); border: 1px solid var(--success); box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); }
        .notification.miss { background: rgba(255, 0, 127, 0.2); color: var(--secondary); border: 1px solid var(--secondary); box-shadow: 0 0 20px rgba(255, 0, 127, 0.4); }

        /* PERFECT MOBILE VIEW ALIGNMENT */
        @media (max-width: 768px) {
            .view-hint { bottom: 180px; } /* Push above mobile controls */
            
            .hud-overlay {
                top: auto;
                bottom: 0;
                left: 0;
                width: 100vw;
                border-radius: 25px 25px 0 0;
                padding: 20px;
                background: rgba(10, 10, 26, 0.95); /* darker for readability */
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px 15px;
            }
            
            h1 { display: none; } /* Hide title to save space */
            
            .slider-group { margin-bottom: 0; }
            .fire-btn { grid-column: span 2; margin-top: 5px; padding: 15px; font-size: 1.2rem;}
            
            .telemetry-overlay {
                top: 70px;
                right: auto;
                left: 10px;
                width: calc(100vw - 20px);
                justify-content: space-between;
                gap: 10px;
                padding: 10px 15px;
                box-sizing: border-box;
            }

            .notification {
                top: 130px;
                left: 50%;
                right: auto;
                transform: translateX(-50%) scale(0.9);
                width: max-content;
            }
            .notification.show { transform: translateX(-50%) scale(1); }
        }
    </style>
</head>
<body>

    <a href="https://mohakdev1220.github.io/experiments/" class="back-btn">← Home</a>

    <div id="canvas-container"></div>
    <div class="view-hint">👆 Drag screen to rotate 3D view</div>

    <!-- Telemetry (Top Right / Top Center on Mobile) -->
    <div class="panel telemetry-overlay">
        <div class="telemetry-stat">
            <span>Air Time</span>
            <strong id="t-flight">0.00s</strong>
        </div>
        <div class="telemetry-stat">
            <span>Height</span>
            <strong id="max-h">0.0m</strong>
        </div>
        <div class="telemetry-stat">
            <span>Distance</span>
            <strong id="impact-d">0.0m</strong>
        </div>
    </div>

    <!-- HUD Controls (Bottom on Mobile) -->
    <div class="panel hud-overlay">
        <h1>Neon Artillery</h1>
        
        <div class="slider-group">
            <div class="slider-header">
                <span>Angle ($\theta$)</span>
                <span id="angle-val">45°</span>
            </div>
            <input type="range" id="angle" min="10" max="85" value="45">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <span>Power ($v_0$)</span>
                <span id="velocity-val">25 m/s</span>
            </div>
            <input type="range" id="velocity" min="10" max="45" value="25">
        </div>

        <div class="slider-group" style="grid-column: span 2;">
            <div class="slider-header">
                <span>Target Distance</span>
                <span id="target-val">50m</span>
            </div>
            <input type="range" id="target-dist" min="20" max="90" value="50">
        </div>

        <button class="fire-btn" id="fire-trigger">🔥 LAUNCH</button>
    </div>

    <div class="notification" id="toast"></div>

    <script>
        // --- CUSTOM AUDIO SETUP ---
        // Puraani files ki jagah aapki requested files. Make sure ye files root folder me hain!
        const audioLaunch = new Audio('launch.mp3');
        const audioHit = new Audio('boom.mp3');
        const audioMiss = new Audio('are.mp3');

        function playCustomSound(type) {
            try {
                if (type === 'launch') {
                    audioLaunch.currentTime = 0; 
                    audioLaunch.play().catch(e => console.log("Audio not found:", e));
                }
                if (type === 'hit') {
                    audioHit.currentTime = 0; 
                    audioHit.play().catch(e => console.log("Audio not found:", e));
                }
                if (type === 'miss') {
                    audioMiss.currentTime = 0; 
                    audioMiss.play().catch(e => console.log("Audio not found:", e));
                }
            } catch(err) {
                console.error("Audio playback error:", err);
            }
        }

        // --- PHYSICS VARS ---
        const g = 9.81;
        let isFlightActive = false;
        let timeElapsed = 0;
        let flightParams = { v0: 25, angleDeg: 45, vx: 0, vy: 0 };

        // --- THREE.JS ENGINE SETUP (NEON SHANDAR THEME) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a); // Deep dark space background
        scene.fog = new THREE.FogExp2(0x05050a, 0.006);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Adjust Camera for Mobile so UI doesn't hide the action
        if(window.innerWidth < 768) {
            camera.position.set(-15, 35, 75);
        } else {
            camera.position.set(-25, 20, 60);
        }
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(30, 5, 0); // Center the view between cannon and target
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.02; // Don't let camera go below ground
        controls.minDistance = 10;
        controls.maxDistance = 150;

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0x1a1a2e, 2.5)); // Base dark blue ambient
        
        const moonLight = new THREE.DirectionalLight(0x4a4a8a, 1);
        moonLight.position.set(-20, 50, -20);
        scene.add(moonLight);

        // --- GLOWING GRID FLOOR ---
        const gridHelper = new THREE.GridHelper(300, 100, 0x00f3ff, 0x002233);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const floorGeo = new THREE.PlaneGeometry(300, 150);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x020205, 
            roughness: 0.1, // Shiny reflective floor
            metalness: 0.8
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- CANNON DESIGN (Dark Metal + Neon) ---
        const cannonGroup = new THREE.Group();
        scene.add(cannonGroup);

        const metalMat = new THREE.MeshStandardMaterial({ color: 0x11111a, roughness: 0.3, metalness: 0.9 });
        const neonCyanMat = new THREE.MeshStandardMaterial({ color: 0x00f3ff, emissive: 0x00f3ff, emissiveIntensity: 0.5 });

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.5, 24);
        wheelGeo.rotateX(Math.PI / 2);
        const wheelL = new THREE.Mesh(wheelGeo, metalMat); wheelL.position.set(0, 1.5, 2.2);
        const wheelR = new THREE.Mesh(wheelGeo, metalMat); wheelR.position.set(0, 1.5, -2.2);
        
        // Neon Hubcaps
        const hubGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.6, 16);
        hubGeo.rotateX(Math.PI / 2);
        const hubL = new THREE.Mesh(hubGeo, neonCyanMat); hubL.position.set(0, 1.5, 2.2);
        const hubR = new THREE.Mesh(hubGeo, neonCyanMat); hubR.position.set(0, 1.5, -2.2);
        cannonGroup.add(wheelL, wheelR, hubL, hubR);

        // Barrel Pivot
        const barrelPivot = new THREE.Group();
        barrelPivot.position.set(0, 1.5, 0);
        const barrelGeo = new THREE.CylinderGeometry(0.7, 1.1, 5, 24);
        const barrelMesh = new THREE.Mesh(barrelGeo, metalMat);
        barrelMesh.rotation.z = Math.PI / 2;
        barrelMesh.position.set(2, 0, 0);
        
        // Glowing Rings on Barrel
        const ringGeo = new THREE.TorusGeometry(0.9, 0.1, 8, 24);
        const ring1 = new THREE.Mesh(ringGeo, neonCyanMat);
        ring1.rotation.y = Math.PI / 2;
        ring1.position.set(3, 0, 0);
        
        barrelPivot.add(barrelMesh, ring1);
        cannonGroup.add(barrelPivot);

        // --- GLOWING PROJECTILE ---
        const ballGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ 
            color: 0xff007f, 
            emissive: 0xff007f, 
            emissiveIntensity: 0.8,
            roughness: 0.1
        });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.visible = false;
        scene.add(ball);

        // Dynamic Point Light attached to the ball (makes the floor glow as it flies)
        const ballLight = new THREE.PointLight(0xff007f, 2, 30);
        ballLight.position.set(0,0,0);
        ball.add(ballLight); 

        // --- TRAIL SYSTEM ---
        const trailPositions = [];
        const trailGeo = new THREE.BufferGeometry();
        const trailMat = new THREE.LineBasicMaterial({ color: 0xff007f, linewidth: 3 });
        const trailLine = new THREE.Line(trailGeo, trailMat);
        scene.add(trailLine);

        // --- TARGET SYSTEM ---
        const targetGroup = new THREE.Group();
        scene.add(targetGroup);
        
        const tOuterGeo = new THREE.CylinderGeometry(4.5, 4.5, 0.2, 32);
        const tOuterMat = new THREE.MeshStandardMaterial({ color: 0x050510, emissive: 0x002233 });
        const targetOuter = new THREE.Mesh(tOuterGeo, tOuterMat);
        
        const tRingGeo = new THREE.TorusGeometry(4.5, 0.15, 8, 32);
        const targetRing = new THREE.Mesh(tRingGeo, neonCyanMat);
        targetRing.rotation.x = Math.PI / 2;
        targetRing.position.y = 0.1;

        const tInnerGeo = new THREE.CylinderGeometry(2, 2, 0.25, 32);
        const tInnerMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x39ff14, emissiveIntensity: 0.6 });
        const targetInner = new THREE.Mesh(tInnerGeo, tInnerMat);
        targetInner.position.y = 0.1;
        
        targetGroup.add(targetOuter, targetRing, targetInner);

        // --- EXPLOSION PARTICLES ---
        const pCount = 50;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        const pVel = [];
        for(let i=0; i<pCount; i++) pVel.push(new THREE.Vector3());
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        
        const pMatHit = new THREE.PointsMaterial({ color: 0x39ff14, size: 0.6, transparent: true, blending: THREE.AdditiveBlending });
        const pMatMiss = new THREE.PointsMaterial({ color: 0xff007f, size: 0.6, transparent: true, blending: THREE.AdditiveBlending });
        
        const particleSystem = new THREE.Points(pGeo, pMatHit);
        particleSystem.visible = false;
        scene.add(particleSystem);
        let explosionTime = 0;

        // Predictive Target Line
        let pathLine = null;

        // --- UI & LOGIC INTEGRATION ---
        function updateFromSliders() {
            flightParams.angleDeg = parseFloat(document.getElementById('angle').value);
            flightParams.v0 = parseFloat(document.getElementById('velocity').value);
            const targetX = parseFloat(document.getElementById('target-dist').value);

            document.getElementById('angle-val').textContent = `${flightParams.angleDeg}°`;
            document.getElementById('velocity-val').textContent = `${flightParams.v0} m/s`;
            document.getElementById('target-val').textContent = `${targetX}m`;

            barrelPivot.rotation.z = math.unit(flightParams.angleDeg, 'deg').toNumber('rad');
            targetGroup.position.set(targetX, 0.1, 0);
            
            // On mobile, keep target in view dynamically
            if(window.innerWidth < 768 && !isFlightActive) {
                controls.target.set(targetX / 2, 5, 0);
            }

            drawPredictivePath();
        }

        function drawPredictivePath() {
            if (pathLine) scene.remove(pathLine);
            const rad = math.unit(flightParams.angleDeg, 'deg').toNumber('rad');
            const vx0 = flightParams.v0 * Math.cos(rad);
            const vy0 = flightParams.v0 * Math.sin(rad);
            
            flightParams.vx = vx0; flightParams.vy = vy0;
            const totalTime = (2 * vy0) / g;

            const pts = [];
            for(let i = 0; i <= 40; i++) {
                const t = (totalTime / 40) * i;
                const x = vx0 * t;
                const y = (vy0 * t) - (0.5 * g * Math.pow(t, 2));
                if (y >= 0) pts.push(new THREE.Vector3(x, y + 1.5, 0));
            }
            const pMat = new THREE.LineDashedMaterial({ color: 0x00f3ff, dashSize: 1.5, gapSize: 1, transparent: true, opacity: 0.4 });
            const pGeo = new THREE.BufferGeometry().setFromPoints(pts);
            pathLine = new THREE.Line(pGeo, pMat);
            pathLine.computeLineDistances();
            scene.add(pathLine);
        }

        document.getElementById('angle').addEventListener('input', updateFromSliders);
        document.getElementById('velocity').addEventListener('input', updateFromSliders);
        document.getElementById('target-dist').addEventListener('input', updateFromSliders);
        const fireBtn = document.getElementById('fire-trigger');

        fireBtn.addEventListener('click', () => {
            if (isFlightActive) return;
            
            playCustomSound('launch'); // MP3 Audio Play
            
            ball.position.set(0, 1.5, 0);
            ball.visible = true;
            trailPositions.length = 0;
            trailLine.visible = true;
            particleSystem.visible = false;
            
            timeElapsed = 0;
            isFlightActive = true;
            fireBtn.disabled = true;
        });

        function triggerExplosion(x, y, z, isHit) {
            particleSystem.position.set(x, y, z);
            particleSystem.material = isHit ? pMatHit : pMatMiss;
            particleSystem.visible = true;
            explosionTime = 1.2; 
            
            const posAttr = particleSystem.geometry.attributes.position;
            for(let i = 0; i < pCount; i++) {
                posAttr.setXYZ(i, 0, 0, 0);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = 3 + Math.random() * 7;
                pVel[i].set(
                    speed * Math.sin(phi) * Math.cos(theta),
                    speed * Math.sin(phi) * Math.sin(theta),
                    speed * Math.cos(phi)
                );
            }
            posAttr.needsUpdate = true;
        }

        // --- RENDER LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            controls.update();

            if (isFlightActive) {
                timeElapsed += delta * 1.3; 
                
                const currentX = flightParams.vx * timeElapsed;
                const currentY = 1.5 + (flightParams.vy * timeElapsed) - (0.5 * g * Math.pow(timeElapsed, 2));

                document.getElementById('t-flight').textContent = `${timeElapsed.toFixed(2)}s`;
                document.getElementById('max-h').textContent = `${Math.max(currentY, parseFloat(document.getElementById('max-h').textContent)).toFixed(1)}m`;
                document.getElementById('impact-d').textContent = `${currentX.toFixed(1)}m`;

                if (currentY >= 0.7) {
                    ball.position.set(currentX, currentY, 0);
                    
                    // Track camera to ball optionally
                    // controls.target.set(currentX, currentY, 0);
                    
                    trailPositions.push(new THREE.Vector3(currentX, currentY, 0));
                    if(trailPositions.length > 30) trailPositions.shift();
                    trailGeo.setFromPoints(trailPositions);
                } else {
                    // IMPACT POINT
                    isFlightActive = false;
                    ball.visible = false;
                    fireBtn.disabled = false;
                    
                    const targetX = targetGroup.position.x;
                    const accuracy = Math.abs(currentX - targetX);
                    const isHit = accuracy <= 4.5;
                    
                    triggerExplosion(currentX, 0.5, 0, isHit);

                    const toast = document.getElementById('toast');

                    if (isHit) {
                        playCustomSound('hit'); // MP3 Audio
                        toast.innerHTML = "🎯 <b>TARGET DESTROYED</b>";
                        toast.className = "notification success show";
                    } else {
                        playCustomSound('miss'); // MP3 Audio
                        toast.innerHTML = `⚠️ <b>MISSED BY ${accuracy.toFixed(1)}m</b>`;
                        toast.className = "notification miss show";
                    }
                    
                    // Reset Camera Focus
                    controls.target.set(targetX / 2, 5, 0);
                    setTimeout(() => toast.className = "notification", 3500);
                }
            }

            // Animate Explosion
            if (explosionTime > 0) {
                explosionTime -= delta;
                const posAttr = particleSystem.geometry.attributes.position;
                for(let i=0; i<pCount; i++) {
                    const x = posAttr.getX(i) + pVel[i].x * delta;
                    const y = posAttr.getY(i) + pVel[i].y * delta;
                    const z = posAttr.getZ(i) + pVel[i].z * delta;
                    posAttr.setXYZ(i, x, y, z);
                }
                posAttr.needsUpdate = true;
                particleSystem.material.opacity = explosionTime;
            }

            renderer.render(scene, camera);
        }

        // Handle Resizing smoothly
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if(window.innerWidth < 768) {
                camera.position.set(-15, 35, 75);
            } else {
                camera.position.set(-25, 20, 60);
            }
        });

        updateFromSliders();
        animate();
    </script>
</body>
</html>
